# BAP Receiver Routing — inbound on_* callbacks from BPPs to our BAP service
#
# All on_* callbacks are forwarded to bap-marketplace (our FastAPI BAP backend).

routingRules:
  - domain: "beckn.one/testnet"
    version: "2.0.0"
    targetType: "url"
    target:
      url: "http://bap-marketplace:3001/api/bap-webhook"
    endpoints:
      - on_discover
      - on_select
      - on_init
      - on_confirm
      - on_status
      - on_track
      - on_update
      - on_cancel
      - on_rate
      - on_support