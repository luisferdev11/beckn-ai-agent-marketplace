services:
  # ============================================================
  # Redis — shared cache for both adapters
  # ============================================================
  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - beckn_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # onix-bap — Beckn adapter acting as BAP
  #   Caller  (outbound): http://localhost:8081/bap/caller/
  #   Receiver (inbound): http://localhost:8081/bap/receiver/
  # ============================================================
  onix-bap:
    image: beckn-onix:latest
    container_name: onix-bap
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8081:8081"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    volumes:
      - ../config:/app/config
    command: ["./server", "--config=/app/config/generic-bap.yaml"]

  # ============================================================
  # onix-bpp — Beckn adapter acting as BPP
  #   Caller  (outbound): http://localhost:8082/bpp/caller/
  #   Receiver (inbound): http://localhost:8082/bpp/receiver/
  # ============================================================
  onix-bpp:
    image: beckn-onix:latest
    container_name: onix-bpp
    platform: linux/amd64
    networks:
      - beckn_network
    ports:
      - "8082:8082"
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      REDIS_ADDR: redis:6379
    volumes:
      - ../config:/app/config
    command: ["./server", "--config=/app/config/generic-bpp.yaml"]

  # ============================================================
  # sandbox-bap — mock BAP application
  #   Receives on_* callbacks at: http://sandbox-bap:3001/api/bap-webhook
  #   Health:                     http://localhost:3001/api/health
  # ============================================================
  sandbox-bap:
    container_name: sandbox-bap
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3001
    ports:
      - "3001:3001"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - beckn_network

  # ============================================================
  # sandbox-bpp — mock BPP application
  #   Receives action requests at: http://sandbox-bpp:3002/api/webhook
  #   Health:                      http://localhost:3002/api/health
  # ============================================================
  sandbox-bpp:
    container_name: sandbox-bpp
    image: fidedocker/sandbox-2.0:latest
    environment:
      - NODE_ENV=production
      - PORT=3002
    ports:
      - "3002:3002"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/api/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - beckn_network

networks:
  beckn_network:
    name: beckn_network
    driver: bridge
